<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账务处理系统 - 中小制造业</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a56db;
      --primary-dark: #1e429f;
      --primary-light: #e8f0fe;
      --success: #0e9f6e;
      --warning: #c27803;
      --danger: #e02424;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --sidebar-w: 220px;
    }
    body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--gray-50); color: var(--gray-900); display: flex; min-height: 100vh; }

    /* 侧边栏 */
    #sidebar {
      width: var(--sidebar-w); background: #1e293b; color: #e2e8f0;
      display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100;
    }
    .sidebar-logo {
      padding: 20px 16px; font-size: 16px; font-weight: 700; color: #fff;
      border-bottom: 1px solid #334155; line-height: 1.4;
    }
    .sidebar-logo span { display: block; font-size: 11px; font-weight: 400; color: #94a3b8; margin-top: 2px; }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
    .nav-group-title { padding: 12px 16px 4px; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 16px;
      cursor: pointer; transition: background 0.15s; font-size: 14px; color: #cbd5e1;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: #334155; color: #fff; }
    .nav-item.active { background: #1e40af; color: #fff; border-left-color: #60a5fa; }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

    /* 主内容 */
    #main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar {
      background: #fff; border-bottom: 1px solid var(--gray-200); padding: 0 24px;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 16px; font-weight: 600; color: var(--gray-900); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .period-badge {
      background: var(--primary-light); color: var(--primary); border-radius: 6px;
      padding: 4px 12px; font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .content-area { flex: 1; padding: 24px; }

    /* 卡片 */
    .card { background: #fff; border-radius: 10px; border: 1px solid var(--gray-200); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    /* 统计卡片 */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .stat-card { background: #fff; border-radius: 10px; border: 1px solid var(--gray-200); padding: 16px 20px; }
    .stat-label { font-size: 12px; color: var(--gray-500); margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 700; color: var(--gray-900); }
    .stat-sub { font-size: 12px; color: var(--gray-500); margin-top: 4px; }

    /* 按钮 */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
      border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer;
      border: none; transition: all 0.15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-300); }
    .btn-secondary:hover { background: var(--gray-200); }
    .btn-danger { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* 表格 */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: var(--gray-50); }
    th { padding: 10px 12px; text-align: left; font-weight: 600; color: var(--gray-700); border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
    td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-50); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }

    /* 状态标签 */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge-draft { background: #fef9c3; color: #854d0e; }
    .badge-audited { background: #dcfce7; color: #166534; }
    .badge-posted { background: #dbeafe; color: #1e40af; }
    .badge-open { background: #dcfce7; color: #166534; }
    .badge-closed { background: var(--gray-100); color: var(--gray-500); }

    /* 表单 */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 12px; font-weight: 500; color: var(--gray-700); }
    .form-control {
      padding: 8px 12px; border: 1px solid var(--gray-300); border-radius: 7px;
      font-size: 13px; outline: none; background: #fff; transition: border 0.15s;
    }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
    select.form-control { cursor: pointer; }
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-field label { font-size: 12px; font-weight: 500; color: var(--gray-700); }
    .form-field input, .form-field select, .form-field textarea {
      padding: 8px 12px; border: 1px solid var(--gray-300); border-radius: 7px;
      font-size: 13px; outline: none; background: #fff; transition: border 0.15s;
    }
    .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
      border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
    }
    .form-field select { cursor: pointer; }

    /* 搜索栏 */
    .filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }

    /* 凭证明细行 */
    .detail-table th, .detail-table td { padding: 7px 8px; }
    .detail-table input { width: 100%; padding: 4px 8px; border: 1px solid var(--gray-200); border-radius: 5px; font-size: 12px; }
    .detail-table select { width: 100%; padding: 4px 8px; border: 1px solid var(--gray-200); border-radius: 5px; font-size: 12px; }

    /* 模态框 */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
      display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: #fff; border-radius: 12px; padding: 24px; width: 90%;
      max-width: 900px; max-height: 90vh; overflow-y: auto; position: relative;
    }
    .modal-lg { max-width: 1100px; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .modal-footer { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray-500); }

    /* 报表 */
    .report-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
    .report-bold td { font-weight: 700; background: var(--gray-50); }
    .report-highlight td { color: var(--primary); font-size: 15px; background: var(--primary-light); }

    /* 分页 */
    .pagination { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; }
    .page-btn { padding: 4px 10px; border: 1px solid var(--gray-300); border-radius: 5px; cursor: pointer; background: #fff; }
    .page-btn:hover { background: var(--gray-100); }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* 工具提示 */
    .toast {
      position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
      background: #1e293b; color: #fff; border-radius: 8px; font-size: 13px;
      z-index: 9999; animation: slideUp 0.3s ease; max-width: 320px;
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* 空状态 */
    .empty-state { text-align: center; padding: 48px; color: var(--gray-500); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* 响应式 */
    @media (max-width: 768px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: 1fr; }
    }

    /* 隐藏 */
    .hidden { display: none !important; }

    /* 分割线 */
    hr.section { border: none; border-top: 1px solid var(--gray-200); margin: 20px 0; }

    /* 科目缩进 */
    .indent-1 { padding-left: 8px; }
    .indent-2 { padding-left: 24px; font-size: 12px; color: var(--gray-500); }

    /* ====== AI 助手聊天 ====== */
    .chat-wrapper { display: flex; flex-direction: column; height: calc(100vh - 120px); background: #fff; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
    .chat-header { padding: 16px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    .chat-header h3 { margin: 0 0 4px; font-size: 16px; }
    .chat-header p { margin: 0; font-size: 12px; opacity: 0.85; }
    .chat-body { flex: 1; overflow-y: auto; padding: 16px; background: #f8fafc; display: flex; flex-direction: column; gap: 12px; }
    .chat-bubble { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.6; word-break: break-word; animation: fadeInUp 0.3s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .chat-bubble.user { align-self: flex-end; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-bottom-right-radius: 4px; }
    .chat-bubble.ai { align-self: flex-start; background: #fff; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }
    .chat-bubble.ai strong { color: #4f46e5; }
    .chat-input-area { display: flex; gap: 8px; padding: 12px 16px; background: #fff; border-top: 1px solid #e2e8f0; }
    .chat-input-area input { flex: 1; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 24px; font-size: 13px; outline: none; transition: border 0.15s; }
    .chat-input-area input:focus { border-color: #667eea; }
    .chat-input-area button { padding: 10px 20px; border: none; border-radius: 24px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .chat-input-area button:hover { opacity: 0.9; }
    .chat-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    .chat-upload-btn {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border: 1px solid #e2e8f0; border-radius: 50%;
      background: #fff; color: #64748b; font-size: 18px; cursor: pointer;
      transition: all 0.15s; flex-shrink: 0;
    }
    .chat-upload-btn:hover { background: #f1f5f9; border-color: #667eea; color: #667eea; }
    .chat-upload-btn.uploading { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    .chat-file-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 8px;
      padding: 6px 10px; font-size: 12px; color: #4338ca; margin-bottom: 4px;
    }
    .chat-quick-actions { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 16px; background: #fff; border-top: 1px solid #f1f5f9; }
    .chat-chip { padding: 4px 12px; border: 1px solid #e2e8f0; border-radius: 16px; font-size: 11px; background: #fff; color: #475569; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .chat-chip:hover { background: #f1f5f9; border-color: #667eea; color: #667eea; }
    .typing-indicator { display: flex; gap: 4px; padding: 8px 12px; }
    .typing-indicator span { width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  </style>
</head>
<body>

<!-- 侧边栏 -->
<nav id="sidebar">
  <div class="sidebar-logo">
    ⚙️ 账务处理系统
    <span>中小制造业版 v1.0</span>
  </div>
  <div class="sidebar-nav">
    <div class="nav-group-title">总览</div>
    <div class="nav-item" data-page="chat" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-radius: 8px; margin: 0 4px 6px; padding: 10px 14px;">
      <span class="icon">🤖</span>AI 助手
    </div>
    <div class="nav-item active" data-page="dashboard"><span class="icon">📊</span>数据看板</div>

    <div class="nav-group-title">凭证管理</div>
    <div class="nav-item" data-page="vouchers"><span class="icon">📋</span>记账凭证</div>
    <div class="nav-item" data-page="voucher-new"><span class="icon">✏️</span>填制凭证</div>

    <div class="nav-group-title">账簿查询</div>
    <div class="nav-item" data-page="general-ledger"><span class="icon">📒</span>总账</div>
    <div class="nav-item" data-page="detail-ledger"><span class="icon">📄</span>明细账</div>

    <div class="nav-group-title">财务报表</div>
    <div class="nav-item" data-page="profit-loss"><span class="icon">📈</span>利润表</div>
    <div class="nav-item" data-page="balance-sheet"><span class="icon">⚖️</span>资产负债表</div>

    <div class="nav-group-title">基础档案</div>
    <div class="nav-item" data-page="company"><span class="icon">🏢</span>公司信息</div>
    <div class="nav-item" data-page="departments"><span class="icon">🏬</span>部门档案</div>
    <div class="nav-item" data-page="employees"><span class="icon">👥</span>人员档案</div>
    <div class="nav-item" data-page="customers"><span class="icon">🤝</span>客户档案</div>
    <div class="nav-item" data-page="suppliers"><span class="icon">📦</span>供应商档案</div>

    <div class="nav-group-title">基础设置</div>
    <div class="nav-item" data-page="accounts"><span class="icon">🗂️</span>会计科目</div>
    <div class="nav-item" data-page="periods"><span class="icon">📅</span>期间管理</div>
  </div>
</nav>

<!-- 主内容 -->
<div id="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">数据看板</div>
    <div class="topbar-right">
      <div class="period-badge" id="current-period-badge" onclick="showPeriodSelector()">
        📅 当前期间：<span id="current-period">加载中...</span>
      </div>
    </div>
  </div>
  <div class="content-area" id="content-area">
    <!-- 动态内容 -->
  </div>
</div>

<script>
// ==================== 全局状态 ====================
let currentPage = 'dashboard';
let currentPeriod = '';
let allAccounts = [];
let voucherPage = 1;

const pages = {
  'chat': 'AI 助手',
  'dashboard': '数据看板',
  'company': '公司信息',
  'departments': '部门档案',
  'employees': '人员档案',
  'customers': '客户档案',
  'suppliers': '供应商档案',
  'vouchers': '记账凭证',
  'voucher-new': '填制凭证',
  'general-ledger': '总账',
  'detail-ledger': '明细账',
  'profit-loss': '利润表',
  'balance-sheet': '资产负债表',
  'accounts': '会计科目',
  'periods': '期间管理'
};

// ==================== 初始化 ====================
async function init() {
  await loadCurrentPeriod();
  await loadAllAccounts();
  navigateTo('dashboard');
}

async function loadCurrentPeriod() {
  try {
    const data = await api('/api/periods');
    const open = data.find(p => p.status === '开放');
    currentPeriod = open ? open.period : (data[0]?.period || new Date().toISOString().slice(0, 7));
    document.getElementById('current-period').textContent = currentPeriod;
  } catch (e) {
    currentPeriod = new Date().toISOString().slice(0, 7);
    document.getElementById('current-period').textContent = currentPeriod;
  }
}

async function loadAllAccounts() {
  try {
    allAccounts = await api('/api/accounts');
  } catch (e) {}
}

// ==================== 路由 ====================
function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.getElementById('page-title').textContent = pages[page] || page;
  const content = document.getElementById('content-area');
  content.innerHTML = '';

  switch (page) {
    case 'chat': renderChat(); break;
    case 'dashboard': renderDashboard(); break;
    case 'vouchers': renderVouchers(); break;
    case 'voucher-new': renderVoucherForm(); break;
    case 'general-ledger': renderGeneralLedger(); break;
    case 'detail-ledger': renderDetailLedger(); break;
    case 'profit-loss': renderProfitLoss(); break;
    case 'balance-sheet': renderBalanceSheet(); break;
    case 'accounts': renderAccounts(); break;
    case 'periods': renderPeriods(); break;
    case 'company': renderCompany(); break;
    case 'departments': renderDepartments(); break;
    case 'employees': renderEmployees(); break;
    case 'customers': renderCustomers(); break;
    case 'suppliers': renderSuppliers(); break;
  }
}

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => navigateTo(el.dataset.page));
});

// ==================== API 工具 ====================
async function api(url, options = {}) {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...options
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: '请求失败' }));
    throw new Error(err.detail || '请求失败');
  }
  return res.json();
}

function toast(msg, type = 'default') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function fmt(n) {
  if (n === null || n === undefined) return '-';
  return Number(n).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ==================== 数据看板 ====================
async function renderDashboard() {
  const el = document.getElementById('content-area');
  el.innerHTML = '<div style="color:#999;padding:20px">加载中...</div>';
  try {
    const data = await api(`/api/dashboard?period=${currentPeriod}`);
    el.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">本期凭证总数</div>
          <div class="stat-value">${data.total_vouchers}</div>
          <div class="stat-sub">${currentPeriod}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">草稿凭证</div>
          <div class="stat-value" style="color:var(--warning)">${data.draft_vouchers}</div>
          <div class="stat-sub">待审核</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">已审核凭证</div>
          <div class="stat-value" style="color:var(--success)">${data.audited_vouchers}</div>
          <div class="stat-sub">已完成</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">本期借方合计</div>
          <div class="stat-value" style="font-size:18px;color:var(--primary)">¥${fmt(data.total_amount)}</div>
          <div class="stat-sub">元</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📋 最近凭证</div>
        ${data.recent_vouchers.length === 0 ? '<div class="empty-state"><div class="icon">📭</div><p>暂无凭证，去<a href="#" onclick="navigateTo(\'voucher-new\');return false">填制凭证</a></p></div>' : `
        <div class="table-wrap">
          <table>
            <thead><tr><th>凭证号</th><th>日期</th><th>摘要</th><th class="num">金额</th><th>状态</th></tr></thead>
            <tbody>
              ${data.recent_vouchers.map(v => `
                <tr>
                  <td><a href="#" onclick="showVoucherDetail(${v.voucher_no});return false" style="color:var(--primary)">${v.voucher_no}</a></td>
                  <td>${v.voucher_date}</td>
                  <td>${v.summary}</td>
                  <td class="num">¥${fmt(v.total_debit)}</td>
                  <td>${statusBadge(v.status)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`}
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="navigateTo('voucher-new')">✏️ 填制新凭证</button>
        <button class="btn btn-secondary" onclick="navigateTo('vouchers')">📋 查看全部凭证</button>

async function loadVouchers() {
  const period = document.getElementById('f-period')?.value || currentPeriod;
  const status = document.getElementById('f-status')?.value || '';
  const keyword = document.getElementById('f-keyword')?.value || '';
  const url = `/api/vouchers?page=${voucherPage}&page_size=15${period ? '&period=' + period : ''}${status ? '&status=' + status : ''}${keyword ? '&keyword=' + keyword : ''}`;

  try {
    const data = await api(url);
    const tbody = data.data.map(v => `
      <tr>
        <td><a href="#" onclick="showVoucherDetailById(${v.id});return false" style="color:var(--primary);font-weight:500">${v.voucher_no}</a></td>
        <td>${v.voucher_date}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.summary}</td>
        <td class="num">¥${fmt(v.total_debit)}</td>
        <td>${v.creator}</td>
        <td>${statusBadge(v.status)}</td>
        <td>
          ${v.status === '草稿' ? `<button class="btn btn-success btn-sm" onclick="auditVoucher(${v.id})">审核</button>` : ''}
          ${v.status !== '已过账' ? `<button class="btn btn-danger btn-sm" onclick="deleteVoucher(${v.id})">删除</button>` : ''}
        </td>
      </tr>
    `).join('');

    document.getElementById('voucher-table').innerHTML = `
      <table>
        <thead><tr><th>凭证号</th><th>日期</th><th>摘要</th><th class="num">金额</th><th>制单人</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>${tbody || '<tr><td colspan="7"><div class="empty-state"><div class="icon">📭</div><p>暂无凭证</p></div></td></tr>'}</tbody>
      </table>
    `;

    const totalPages = Math.ceil(data.total / 15);
    let pages = `<span style="color:var(--gray-500)">共 ${data.total} 条</span>`;
    for (let i = 1; i <= totalPages; i++) {
      pages += `<button class="page-btn ${i === voucherPage ? 'active' : ''}" onclick="renderVouchers(${i})">${i}</button>`;
    }
    document.getElementById('voucher-pagination').innerHTML = pages;
  } catch (e) {
    document.getElementById('voucher-table').innerHTML = `<p style="color:var(--danger);padding:12px">${e.message}</p>`;
  }
}

function renderDetailRows() {
  const tbody = document.getElementById('detail-tbody');
  const accountOptions = allAccounts
    .filter(a => a.is_active)
    .map(a => `<option value="${a.code}">${a.code} ${a.name}</option>`)
    .join('');

  tbody.innerHTML = detailRows.map((row, idx) => `
    <tr id="detail-row-${idx}">
      <td><input type="number" value="${row.line_no}" onchange="detailRows[${idx}].line_no=+this.value" style="width:40px;padding:4px;border:1px solid var(--gray-200);border-radius:4px"></td>
      <td><input value="${row.summary || ''}" onchange="detailRows[${idx}].summary=this.value" placeholder="摘要"></td>
      <td>
        <select onchange="detailRows[${idx}].account_code=this.value" style="width:100%;padding:4px 6px;border:1px solid var(--gray-200);border-radius:4px;font-size:12px">
          <option value="">-- 选择科目 --</option>
          ${accountOptions}
        </select>
      </td>
      <td><input type="number" step="0.01" value="${row.debit_amount || ''}" onchange="detailRows[${idx}].debit_amount=+this.value||0;calcTotal()" placeholder="0.00" style="width:120px;text-align:right;padding:4px 6px;border:1px solid var(--gray-200);border-radius:4px"></td>
      <td><input type="number" step="0.01" value="${row.credit_amount || ''}" onchange="detailRows[${idx}].credit_amount=+this.value||0;calcTotal()" placeholder="0.00" style="width:120px;text-align:right;padding:4px 6px;border:1px solid var(--gray-200);border-radius:4px"></td>
      <td><button onclick="removeDetailRow(${idx})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px">×</button></td>
    </tr>
  `).join('');

  // 设置已选科目
  detailRows.forEach((row, idx) => {
    const sel = document.querySelector(`#detail-row-${idx} select`);
    if (sel && row.account_code) sel.value = row.account_code;
  });

  calcTotal();
}

function addDetailRow() {
  detailRows.push({ line_no: detailRows.length + 1, summary: '', account_code: '', debit_amount: 0, credit_amount: 0 });
  renderDetailRows();
}

function removeDetailRow(idx) {
  if (detailRows.length <= 2) { toast('至少保留2行', 'error'); return; }
  detailRows.splice(idx, 1);
  detailRows.forEach((r, i) => r.line_no = i + 1);
  renderDetailRows();
}

function calcTotal() {
  const td = detailRows.reduce((s, r) => s + (r.debit_amount || 0), 0);
  const tc = detailRows.reduce((s, r) => s + (r.credit_amount || 0), 0);
  const de = document.getElementById('total-debit');
  const ce = document.getElementById('total-credit');
  const hint = document.getElementById('balance-hint');
  if (de) de.textContent = '¥' + fmt(td);
  if (ce) ce.textContent = '¥' + fmt(tc);
  if (hint) {
    if (Math.abs(td - tc) < 0.001) {
      hint.innerHTML = '<span style="color:var(--success)">✅ 借贷平衡</span>';
    } else {
      hint.innerHTML = `<span style="color:var(--danger)">⚠️ 借贷不平衡，差额：¥${fmt(Math.abs(td - tc))}</span>`;
    }
  }
}

async function submitVoucher() {
  const date = document.getElementById('v-date').value;
  const period = document.getElementById('v-period').value;
  const summary = document.getElementById('v-summary').value;
  const creator = document.getElementById('v-creator').value;
  const attachments = parseInt(document.getElementById('v-attachments').value) || 0;

  if (!date || !period || !summary) { toast('请填写日期、期间和摘要', 'error'); return; }

  const details = detailRows.filter(r => r.account_code);
  if (details.length < 2) { toast('至少需要2行明细', 'error'); return; }

  try {
    const res = await api('/api/vouchers', {
      method: 'POST',
      body: JSON.stringify({ voucher_date: date, period, summary, creator, attachments, details })
    });
    toast(`凭证 ${res.voucher_no} 保存成功！`, 'success');
    setTimeout(() => navigateTo('vouchers'), 1000);
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function loadAccounts() {

  try {
    const data = await api(url);
    allAccounts = data;
    el.innerHTML = `
      <table>
        <thead><tr><th>科目编码</th><th>科目名称</th><th>类别</th><th>余额方向</th><th>级次</th><th>上级科目</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>
          ${data.map(a => `
            <tr>
              <td style="font-weight:500">${a.code}</td>
              <td class="${a.level === 2 ? 'indent-2' : ''}">${a.name}</td>
              <td><span class="badge" style="background:var(--primary-light);color:var(--primary)">${a.category}</span></td>
              <td style="text-align:center">${a.balance_direction}</td>
              <td style="text-align:center">${a.level}</td>

                <button class="btn btn-secondary btn-sm" onclick="toggleAccount(${a.id}, ${!a.is_active})">${a.is_active ? '停用' : '启用'}</button>
                <button class="btn btn-danger btn-sm" onclick="deleteAccount(${a.id})">删除</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (e) {
    el.innerHTML = `<p style="color:var(--danger)">${e.message}</p>`;
  }
}

  const parentOptions = allAccounts.filter(a => a.level === 1).map(a => `<option value="${a.code}">${a.code} ${a.name}</option>`).join('');

async function saveNewAccount() {
  const code = document.getElementById('na-code').value.trim();
  const name = document.getElementById('na-name').value.trim();
  const category = document.getElementById('na-cat').value;
  const balance_direction = document.getElementById('na-dir').value;
  const level = parseInt(document.getElementById('na-level').value);

  if (!code || !name) { toast('请填写科目编码和名称', 'error'); return; }

    await api('/api/accounts', { method: 'POST', body: JSON.stringify({ code, name, category, balance_direction, level, parent_code }) });

    closeModal();
    await loadAccounts();

    toast(e.message, 'error');
  }
}

async function deleteAccount(id) {

    toast(e.message, 'error');
  }
}

async function loadDeptSelect(selectId, selectedId) {

        opt.textContent = d.name;
        if (d.id === selectedId) opt.selected = true;
        sel.appendChild(opt);
      });
    }
  } catch (e) {}
}

// ==================== AI 助手对话 ====================
let chatSessionId = null;
let chatMessages = [];
let chatLoading = false;

async function renderChat() {
  if (!chatSessionId) {
    chatSessionId = 'sess_' + Date.now();
    chatMessages = [{
      role: 'ai',
      text: '👋 你好！我是**存勤账务助手**，你的 AI 会计搭档。\n\n直接告诉我你要做什么，例如：\n• 「录入凭证」— 我带你一步步填\n• 「新增客户」— 快速录入客户档案\n• 「查看利润表 2026-05」— 马上出报表\n\n输入「**帮助**」了解全部功能。'
    }];
  }

  const el = document.getElementById('content-area');
  el.innerHTML = `
    <div class="chat-wrapper">
      <div class="chat-header">
        <h3>🤖 AI 智能助手</h3>
        <p>直接描述需求，我帮你搞定 — 录入凭证 / 新增客户 / 查报表</p>
      </div>
      <div class="chat-quick-actions" id="quick-actions">
        <span class="chat-chip" data-cmd="录入凭证">📝 录入凭证</span>
        <span class="chat-chip" data-cmd="新增客户">👤 新增客户</span>
        <span class="chat-chip" data-cmd="新增供应商">📦 新增供应商</span>
        <span class="chat-chip" data-cmd="新增员工">🧑 新增员工</span>
        <span class="chat-chip" data-cmd="查看利润表">📈 利润表</span>
        <span class="chat-chip" data-cmd="查看资产负债表">⚖️ 资产负债表</span>
        <span class="chat-chip" data-cmd="总账">📒 总账</span>
        <span class="chat-chip" data-cmd="帮助">❓ 帮助</span>
      </div>
      <div class="chat-body" id="chat-body">
        ${renderMessages()}
      </div>
      <div class="chat-input-area">
        <input type="file" id="chat-file-input" accept=".xlsx,.xls,.csv,.pdf,.txt,.md,.log,.png,.jpg,.jpeg,.gif,.bmp,.webp" style="display:none" onchange="handleFileUpload(this)">
        <button class="chat-upload-btn" id="chat-upload-btn" onclick="document.getElementById('chat-file-input').click()" title="上传文件 (Excel/CSV/PDF/文本)">📎</button>
        <input id="chat-input" type="text" placeholder="输入你的需求，或上传文件，例如：录入凭证 5月28日 采购原材料" 
               onkeypress="if(event.key==='Enter') sendChat()" autofocus>
        <button onclick="sendChat()" id="chat-send-btn">发送</button>
      </div>
    </div>
  `;

  // 绑定快捷操作
  document.querySelectorAll('.chat-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.getElementById('chat-input').value = chip.dataset.cmd;
      sendChat();
    });
  });

  // 滚动到底部
  scrollChatBottom();
}

function renderMessages() {
  return chatMessages.map((m, i) => {
    const cls = m.role === 'user' ? 'user' : 'ai';
    // 简单 markdown 渲染：**粗体** 和换行
    let text = m.text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    return `<div class="chat-bubble ${cls}">${text}</div>`;
  }).join('') + (chatLoading ? '<div class="chat-bubble ai"><div class="typing-indicator"><span></span><span></span><span></span></div></div>' : '');
}

function scrollChatBottom() {
  setTimeout(() => {
    const body = document.getElementById('chat-body');
    if (body) body.scrollTop = body.scrollHeight;
  }, 100);
}

async function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;

  const uploadBtn = document.getElementById('chat-upload-btn');
  const sendBtn = document.getElementById('chat-send-btn');

  // 显示上传中
  uploadBtn.classList.add('uploading');
  uploadBtn.textContent = '⏳';
  sendBtn.disabled = true;

  chatMessages.push({ role: 'user', text: `<span class="chat-file-badge">📎 ${file.name} (${formatFileSize(file.size)})</span><br>正在识别文件内容...` });
  chatLoading = true;
  document.getElementById('chat-body').innerHTML = renderMessages();
  scrollChatBottom();

  try {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('session_id', chatSessionId);

    const res = await fetch('/api/chat/upload', { method: 'POST', body: formData });
    const data = await res.json();

    if (data.error) {
      // 更新最后一条消息为错误
      chatMessages[chatMessages.length - 1].text = `📎 ${file.name}<br>❌ ${data.error}`;
    } else {
      // 更新最后一条消息为文件内容摘要
      const contentPreview = data.content.length > 300 ? data.content.substring(0, 300) + '...' : data.content;
      chatMessages[chatMessages.length - 1].text = `<span class="chat-file-badge">📎 ${data.file_name}</span><br><pre style="font-size:11px;max-height:200px;overflow-y:auto;background:#f8fafc;padding:8px;border-radius:6px;white-space:pre-wrap;word-break:break-all;margin:4px 0 0">${escapeHtml(contentPreview)}</pre>`;

      // 将文件内容送入对话处理
      const chatRes = await api('/api/chat', {
        method: 'POST',
        body: JSON.stringify({
          message: `[上传文件] ${data.file_name}\n\n文件内容如下，请帮我处理：\n\n${data.content}`,
          session_id: chatSessionId
        })
      });
      chatMessages.push({ role: 'ai', text: chatRes.reply });

      if (chatRes.action) {
        if (chatRes.action.type === 'navigate') {
          setTimeout(() => navigateTo(chatRes.action.page), 500);
        } else if (chatRes.action.type === 'reload') {
        }
      }
    }
  } catch (e) {
    chatMessages[chatMessages.length - 1].text = `📎 ${file.name}<br>❌ 上传失败：${e.message}`;
  }

  chatLoading = false;
  sendBtn.disabled = false;
  uploadBtn.classList.remove('uploading');
  uploadBtn.textContent = '📎';
  document.getElementById('chat-body').innerHTML = renderMessages();
  scrollChatBottom();
  document.getElementById('chat-input').focus();

  // 清空文件选择
  input.value = '';
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('chat-send-btn');
  const uploadBtn = document.getElementById('chat-upload-btn');
  const msg = input.value.trim();
  if (!msg || chatLoading) return;

  input.value = '';
  chatMessages.push({ role: 'user', text: msg });
  chatLoading = true;
  btn.disabled = true;
  uploadBtn.disabled = true;
  uploadBtn.style.opacity = '0.5';
  uploadBtn.style.cursor = 'not-allowed';
  document.getElementById('chat-body').innerHTML = renderMessages();
  scrollChatBottom();

  try {
    const res = await api('/api/chat', {
      method: 'POST',
      body: JSON.stringify({ message: msg, session_id: chatSessionId })
    });
    chatMessages.push({ role: 'ai', text: res.reply });
    
    // 处理 action
    if (res.action) {
      if (res.action.type === 'navigate') {
        setTimeout(() => navigateTo(res.action.page), 500);
      } else if (res.action.type === 'reload') {
        // 提示用户刷新页面
      }
    }
  } catch (e) {
    chatMessages.push({ role: 'ai', text: '❌ 出错了：' + e.message + '\n\n请刷新页面重试。' });
  }

  chatLoading = false;
  btn.disabled = false;
  uploadBtn.disabled = false;
  uploadBtn.style.opacity = '';
  uploadBtn.style.cursor = '';
  document.getElementById('chat-body').innerHTML = renderMessages();
  scrollChatBottom();
  document.getElementById('chat-input').focus();
}

// HTML 转义
function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function showModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = `<div class="modal modal-lg"><button class="modal-close" onclick="closeModal()">×</button>${html}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}

function closeModal() {
  document.getElementById('modal-overlay')?.remove();
}

function showPeriodSelector() {
  // 简单点击切换期间
  const newPeriod = prompt('输入要切换的会计期间 (格式 YYYY-MM):', currentPeriod);
  if (newPeriod && /^\d{4}-\d{2}$/.test(newPeriod)) {
    currentPeriod = newPeriod;
    document.getElementById('current-period').textContent = currentPeriod;
    toast(`已切换到 ${currentPeriod}`, 'success');
    if (currentPage === 'dashboard') renderDashboard();
  }
}

// ==================== 启动 ====================
init();
</script>
